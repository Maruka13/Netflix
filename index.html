<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">

    <title>Netflix</title>

</head>

<body>
    <main>

        <button id="theme-toggle" onclick="toggleTheme()" 
        style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" 
        aria-label="Alternar tema"></button>

        <h1>Quem está assistindo?</h1>

        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="/assets/perfil1.png" alt="Perfil principal">
                        <figcaption>Carolina</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil2.png" alt="Perfil secundário">
                        <figcaption>Augusto</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil3.png" alt="Perfil terciário">
                        <figcaption>Cristina</figcaption>
                    </figure>
                </a>
                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil4.png" alt="Perfil quaternário">
                        <figcaption>Emanuel</figcaption>
                    </figure>
                </a>
            </nav>
        </section>
        
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
            </nav>
            <button class="manage-profiles">Gerenciar perfis</button>
        </section>
    </main>

    <script src="js/index.js"></script>
    <script src="theme.js"></script>
</body>

</html>
